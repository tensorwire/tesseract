name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin/universal
            suffix: darwin
          - os: ubuntu-latest
            platform: linux/amd64
            suffix: linux-amd64
          - os: windows-latest
            platform: windows/amd64
            suffix: windows-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Build
        run: wails build -platform ${{ matrix.platform }}

      - name: Package macOS
        if: matrix.os == 'macos-latest'
        run: |
          cd build/bin
          zip -r ../../Tesseract-${{ matrix.suffix }}.zip tesseract.app

      - name: Package Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd build/bin
          chmod +x tesseract
          tar czf ../../tesseract-${{ matrix.suffix }}.tar.gz tesseract

      - name: Package Windows
        if: matrix.os == 'windows-latest'
        run: |
          Compress-Archive -Path build\bin\tesseract.exe -DestinationPath tesseract-${{ matrix.suffix }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tesseract-${{ matrix.suffix }}
          path: |
            Tesseract-*.zip
            tesseract-*.tar.gz
            tesseract-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            Tesseract-darwin.zip
            tesseract-linux-amd64.tar.gz
            tesseract-windows-amd64.zip
